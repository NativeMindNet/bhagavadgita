name: Build Flutter artifacts (APK, IPA)

on:
  workflow_dispatch:
    inputs:
      flutter_channel:
        description: Flutter channel
        required: false
        default: stable
        type: choice
        options:
          - stable
          - beta
          - master
      ios_export_method:
        description: iOS export method (app-store / ad-hoc)
        required: false
        default: app-store
        type: choice
        options:
          - app-store
          - ad-hoc
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: app/bhagavadgita.book

jobs:
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutter_channel || 'stable' }}
          cache: true

      - name: Flutter pub get
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      - name: Flutter analyze
        working-directory: ${{ env.APP_DIR }}
        run: flutter analyze

      - name: Flutter test
        working-directory: ${{ env.APP_DIR }}
        run: flutter test

      - name: Materialize Android keystore (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: ${{ env.APP_DIR }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/release.jks

      - name: Build release APK
        working-directory: ${{ env.APP_DIR }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/${{ env.APP_DIR }}/android/keystore/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: |
            ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: iOS (IPA)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ inputs.flutter_channel || 'stable' }}
          cache: true

      - name: Flutter pub get
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      - name: Fail fast if iOS signing secrets missing
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          missing=0
          for v in IOS_CERT_P12_BASE64 IOS_CERT_PASSWORD IOS_PROVISIONING_PROFILE_BASE64 IOS_TEAM_ID; do
            if [ -z "${!v}" ]; then
              echo "::error title=Missing secret::Secret $v is not set"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install CocoaPods
        working-directory: ${{ env.APP_DIR }}/ios
        run: |
          sudo gem install cocoapods --no-document
          pod install

      - name: Import signing certificate (.p12)
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          PROFILE_PLIST="$(security cms -D -i "$PROFILE_PATH")"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$PROFILE_PLIST")
          cp "$PROFILE_PATH" "$PROFILE_DIR/$UUID.mobileprovision"
          echo "IOS_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Prepare ExportOptions.plist
        working-directory: ${{ env.APP_DIR }}/ios
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ inputs.ios_export_method || 'app-store' }}
        run: |
          set -euo pipefail
          cp ExportOptions.plist "$RUNNER_TEMP/ExportOptions.plist"
          sed -i '' "s/__TEAM_ID__/${IOS_TEAM_ID}/g" "$RUNNER_TEMP/ExportOptions.plist"
          sed -i '' "s/__EXPORT_METHOD__/${IOS_EXPORT_METHOD}/g" "$RUNNER_TEMP/ExportOptions.plist"
          sed -i '' "s/__PROFILE_NAME__/${IOS_PROFILE_NAME}/g" "$RUNNER_TEMP/ExportOptions.plist"

      - name: Build signed IPA
        working-directory: ${{ env.APP_DIR }}
        run: flutter build ipa --release --export-options-plist="$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.ref_name }}
          path: |
            ${{ env.APP_DIR }}/build/ios/ipa/*.ipa
